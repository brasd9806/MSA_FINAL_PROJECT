server.port=8088
spring.application.name=point-service
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/postgres?currentSchema=point_schema}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.default-schema=point_schema
spring.flyway.schemas=point_schema
spring.flyway.create-schemas=true
jwt.secret=${JWT_SECRET:sparta-msa-lesson-secret-key-must-be-at-least-256bits-long}
jwt.expiration=${JWT_EXPIRATION:86400000}

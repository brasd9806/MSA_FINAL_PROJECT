version: '3.8'

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  user-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: user-service
    ports:
      - "8081:8081"
    environment:
      - DB_URL=jdbc:postgresql://db:5432/postgres?currentSchema=user_schema
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION=${JWT_EXPIRATION:-86400000}
      - LOGSTASH_HOST=logstash
    depends_on:
      db:
        condition: service_healthy

  product-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: product-service
    ports:
      - "8082:8082"
    environment:
      - DB_URL=jdbc:postgresql://db:5432/postgres?currentSchema=product_schema
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION=${JWT_EXPIRATION:-86400000}
      - LOGSTASH_HOST=logstash
      - USER_SERVICE_URL=http://user-service:8081
    depends_on:
      db:
        condition: service_healthy
      user-service:
        condition: service_started

  cart-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: cart-service
    ports:
      - "8083:8083"
    environment:
      - DB_URL=jdbc:postgresql://db:5432/postgres?currentSchema=cart_schema
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION=${JWT_EXPIRATION:-86400000}
      - LOGSTASH_HOST=logstash
      - PRODUCT_SERVICE_URL=http://product-service:8082
    depends_on:
      db:
        condition: service_healthy
      product-service:
        condition: service_started

  order-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: order-service
    ports:
      - "8084:8084"
    environment:
      - DB_URL=jdbc:postgresql://db:5432/postgres?currentSchema=order_schema
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION=${JWT_EXPIRATION:-86400000}
      - LOGSTASH_HOST=logstash
      - USER_SERVICE_URL=http://user-service:8081
      - PRODUCT_SERVICE_URL=http://product-service:8082
      - CART_SERVICE_URL=http://cart-service:8083
    depends_on:
      db:
        condition: service_healthy
      cart-service:
        condition: service_started

  payment-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: payment-service
    ports:
      - "8085:8085"
    environment:
      - DB_URL=jdbc:postgresql://db:5432/postgres?currentSchema=payment_schema
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION=${JWT_EXPIRATION:-86400000}
      - LOGSTASH_HOST=logstash
      - ORDER_SERVICE_URL=http://order-service:8084
    depends_on:
      db:
        condition: service_healthy
      order-service:
        condition: service_started

  review-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: review-service
    ports:
      - "8086:8086"
    environment:
      - DB_URL=jdbc:postgresql://db:5432/postgres?currentSchema=review_schema
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION=${JWT_EXPIRATION:-86400000}
      - LOGSTASH_HOST=logstash
      - PRODUCT_SERVICE_URL=http://product-service:8082
      - ORDER_SERVICE_URL=http://order-service:8084
    depends_on:
      db:
        condition: service_healthy

  coupon-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: coupon-service
    ports:
      - "8087:8087"
    environment:
      - DB_URL=jdbc:postgresql://db:5432/postgres?currentSchema=coupon_schema
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION=${JWT_EXPIRATION:-86400000}
      - LOGSTASH_HOST=logstash
    depends_on:
      db:
        condition: service_healthy

  point-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: point-service
    ports:
      - "8088:8088"
    environment:
      - DB_URL=jdbc:postgresql://db:5432/postgres?currentSchema=point_schema
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION=${JWT_EXPIRATION:-86400000}
      - LOGSTASH_HOST=logstash
    depends_on:
      db:
        condition: service_healthy

  ai-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: ai-service
    ports:
      - "8089:8089"
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION=${JWT_EXPIRATION:-86400000}
      - LOGSTASH_HOST=logstash
      - OLLAMA_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=llama3.2
    depends_on:
      - logstash

  elasticsearch:
    image: elasticsearch:8.13.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data

  logstash:
    image: logstash:8.13.0
    container_name: logstash
    ports:
      - "5000:5000"
    volumes:
      - ./monitoring/logstash/pipeline:/usr/share/logstash/pipeline
      - ./monitoring/logstash/config/logstash.yml:/usr/share/logstash/config/logstash.yml
    depends_on:
      - elasticsearch

  kibana:
    image: kibana:8.13.0
    container_name: kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  postgres_data:
  grafana_data:
  elasticsearch_data:

server.port=8084
spring.application.name=order-service
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/postgres?currentSchema=public}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.schemas=public
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}
user.service.url=${USER_SERVICE_URL:http://localhost:8081}
product.service.url=${PRODUCT_SERVICE_URL:http://localhost:8082}
cart.service.url=${CART_SERVICE_URL:http://localhost:8083}

server.port=8086
spring.application.name=review-service
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/postgres?currentSchema=review_schema}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.default-schema=review_schema
spring.flyway.schemas=review_schema
spring.flyway.create-schemas=true
jwt.secret=${JWT_SECRET:sparta-msa-lesson-secret-key-must-be-at-least-256bits-long}
jwt.expiration=${JWT_EXPIRATION:86400000}
product.service.url=${PRODUCT_SERVICE_URL:http://localhost:8082}
order.service.url=${ORDER_SERVICE_URL:http://localhost:8084}

# Actuator & Prometheus
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true

logstash.host=${LOGSTASH_HOST:localhost}
